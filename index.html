<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>关系潜意识测试</title>

<style>
:root{
--bg:#0b0b0f;
--card:#15151c;
--text:#e6e6eb;
--sub:#8a8a95;
--accent:#7c5cff;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:var(--bg);
color:var(--text);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

#app{
width:90%;
max-width:600px;
background:var(--card);
padding:30px;
border-radius:10px;
}

h1,h2{color:var(--accent)}

.option{
display:block;
width:100%;
margin:10px 0;
padding:14px;
background:#1f1f28;
border:none;
color:white;
cursor:pointer;
border-radius:6px;
}
.option:hover{background:#2b2b38}

.hidden{display:none}
.progress{color:var(--sub);margin-bottom:15px}

.bar{
height:8px;
background:#222;
border-radius:4px;
margin:6px 0 12px;
overflow:hidden;
}
.fill{
height:100%;
background:var(--accent);
}
</style>
</head>

<body>

<div id="app">

<div id="intro">
<h1>关系潜意识测试</h1>
<p style="color:var(--sub)">
测的不是表面性格，是你在关系里的底层驱动。<br>
你会控制、依附、越界，还是旁观？
</p>
<button onclick="startTest()">开始</button>
</div>

<div id="quiz" class="hidden">
<div class="progress" id="progress"></div>
<div id="q"></div>
<div id="opts"></div>
</div>

<div id="result" class="hidden">
<h2 id="title"></h2>
<p id="desc"></p>

<div id="bars"></div>

<p id="shadow" style="margin-top:20px;color:#bbb"></p>
</div>

</div>

<script>

// 分数
let scores={D:0,S:0,C:0,V:0};
let intensity=0;
let current=0;

// 题库（20题）
const questions=[
["你掌握别人秘密时？",[["留着","V",1],["施压","D",2],["暗示","C",2],["降低距离","S",1]]],
["对方失控时？",[["接管","D",2],["观察","V",1],["推动","C",2],["靠近","S",1]]],
["被影响时？",[["反控","D",2],["分析","V",1],["半顺","C",1],["接受","S",1]]],
["关系稳定后？",[["再掌控","D",2],["抽离","V",1],["打破","C",2],["依赖","S",1]]],
["被忽视？",[["改变局面","D",2],["观察","V",1],["升级冲突","C",2],["内耗","S",1]]],
["看到强者脆弱？",[["掌控感","D",2],["记录","V",1],["试探","C",2],["依附","S",1]]],
["边界被碰？",[["压回去","D",2],["观察","V",1],["推远","C",2],["退让","S",1]]],
["被依赖？",[["扩大控制","D",2],["保持距离","V",1],["抽离","C",1],["享受","S",1]]],
["被误解？",[["重构叙事","D",2],["看发展","V",1],["加深","C",2],["内耗","S",1]]],
["你最在意？",[["控制","D",2],["信息","V",1],["边界","C",2],["关系","S",1]]],

["记住别人哪面？",[["弱点","D",2],["细节","V",1],["失控","C",2],["态度","S",1]]],
["稳定状态？",[["维持优势","D",1],["观察","V",1],["想打破","C",2],["安心","S",1]]],
["会测试人吗？",[["明显","D",2],["隐性","V",1],["极端","C",2],["很少","S",0]]],
["占上风？",[["扩大","D",2],["克制","V",1],["极端","C",2],["收一点","S",1]]],
["最怕？",[["失控","D",2],["未知","V",1],["无聊","C",2],["被抛","S",1]]],
["对方依赖你但你不需要？",[["利用","D",2],["观察","V",1],["拉扯","C",2],["疏远","S",1]]],
["边界本质？",[["控制工具","D",2],["理解结构","V",1],["用来突破","C",2],["依靠","S",1]]],
["被越界？",[["压回","D",2],["记录","V",1],["加码","C",2],["退让","S",1]]],
["关系失衡？",[["重建","D",2],["分析","V",1],["摧毁","C",2],["维持","S",1]]],
["无限制时？",[["控制更多","D",2],["观察更多","V",1],["越界更多","C",2],["依赖更多","S",1]]]
];

// 结果库
const descMap={
D:"你习惯接管结构。\n你不一定强势，但你很少真正让出主导。",
S:"你需要连接。\n你可以退让，只要关系还在。",
C:"你对稳定不信任。\n你需要波动来确认真实。",
V:"你更像观察者。\n你理解一切，但不急于进入。"
};

// 开始
function startTest(){
document.getElementById("intro").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");
render();
}

// 渲染
function render(){
let q=questions[current];
document.getElementById("progress").innerText=(current+1)+"/20";
document.getElementById("q").innerText=q[0];

let box=document.getElementById("opts");
box.innerHTML="";

q[1].forEach(o=>{
let btn=document.createElement("button");
btn.className="option";
btn.innerText=o[0];
btn.onclick=()=>select(o);
box.appendChild(btn);
});
}

// 选择
function select(o){
scores[o[1]]++;
intensity+=o[2];

if(current<questions.length-1){
current++;
render();
}else{
showResult();
}
}

// 结果
function showResult(){
document.getElementById("quiz").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");

let sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);

let main=sorted[0][0];
let shadow=sorted[1][0];

// 标题
document.getElementById("title").innerText=
`主导：${main} ｜ 阴影：${shadow}`;

// 描述
let level=intensity>25?"高强度":intensity>18?"中等强度":"低强度";

document.getElementById("desc").innerText=
descMap[main]+"\n\n强度："+level;

// 阴影说明
document.getElementById("shadow").innerText=
`你在特定情况下会滑向 ${shadow}，这通常发生在你失去当前优势时。`;

// 条形图
let barsHTML="";
["D","S","C","V"].forEach(k=>{
let val=scores[k]*5;
barsHTML+=`
<div>${k}</div>
<div class="bar"><div class="fill" style="width:${val}%"></div></div>
`;
});
document.getElementById("bars").innerHTML=barsHTML;
}

</script>

</body>
</html>
