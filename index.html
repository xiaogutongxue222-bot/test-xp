    function showResult() {
        document.getElementById('screen-quiz').classList.add('hidden');
        document.getElementById('screen-result').classList.remove('hidden');

        // 将分数排序找出Top 2
        const sortedScores = Object.entries(scores).sort((a, b) => b[1] - a[1]);
        const top1 = sortedScores[0][0];
        const top2 = sortedScores[1][0];
        
        // 组合Key，确保即使分数一样也能匹配到确切结果
        let key = top1 + top2;
        if (!profiles[key]) {
            // 如果组合不存在（例如反过来的排序），调换顺序再找
            key = top2 + top1;
        }
        // 如果依然没有（比如分数极端跑偏），就走极端兜底
        if (!profiles[key]) {
             key = top1 + top1;
        }

        const resultData = profiles[key];

        document.getElementById('result-title').innerText = resultData.title;
        document.getElementById('result-desc').innerText = resultData.desc;
    }
</script>
